name: hpds lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Installs the latest published hpds release. Until the first
      # v0.1.0 tag is published this step fails, because no release
      # exists yet — that is expected and documents itself.
      - name: Install hpds
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/StanfordHPDS/hpds-cli/releases/latest/download/hpds-installer.sh | sh

      # Both steps fail the job (and the check) on any violation.
      - name: Lint
        run: hpds lint

      - name: Check formatting
        run: hpds format --check
