name: togi lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Installs the latest published togi release. Until togi's first
      # tag is published this step fails, because no release exists
      # yet; that is expected and documents itself.
      - name: Install togi
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/StanfordHPDS/togi/releases/latest/download/togi-installer.sh | sh

      # Both steps fail the job (and the check) on any violation.
      - name: Lint
        run: togi lint

      - name: Check formatting
        run: togi format --check
